# =============================================================================
# Droy Language - Pre-commit Configuration
# =============================================================================
# This file configures pre-commit hooks for code quality.
# Install: pip install pre-commit && pre-commit install
# =============================================================================

repos:
  # ========================================================================
  # General Hooks
  # ========================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(docs/|\.vscode/)
      - id: end-of-file-fixer
        exclude: ^(docs/|\.vscode/)
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']

  # ========================================================================
  # C/C++ Hooks
  # ========================================================================
  - repo: local
    hooks:
      - id: clang-format
        name: clang-format
        entry: clang-format
        language: system
        files: \.(c|h|cpp|hpp)$
        args: ['-i']

      - id: clang-tidy
        name: clang-tidy
        entry: clang-tidy
        language: system
        files: \.(c|cpp)$
        args: ['--checks=-*,readability-*,bugprone-*,performance-*']
        pass_filenames: false
        always_run: true

      - id: cppcheck
        name: cppcheck
        entry: cppcheck
        language: system
        files: \.(c|cpp)$
        args: ['--enable=all', '--suppress=missingInclude', '--error-exitcode=1']
        pass_filenames: false
        always_run: true

  # ========================================================================
  # Shell Hooks
  # ========================================================================
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.6
    hooks:
      - id: shellcheck
        args: ['-x', '-e', 'SC1091']
        files: \.sh$

  # ========================================================================
  # Markdown Hooks
  # ========================================================================
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.38.0
    hooks:
      - id: markdownlint
        args: ['--fix']
        files: \.md$

  # ========================================================================
  # Git Hooks
  # ========================================================================
  - repo: local
    hooks:
      - id: check-commit-message
        name: Check commit message format
        entry: scripts/check-commit-msg.sh
        language: script
        stages: [commit-msg]

      - id: run-tests
        name: Run quick tests
        entry: scripts/run-tests.sh
        language: script
        args: ['-q', '-u']
        pass_filenames: false
        always_run: true
