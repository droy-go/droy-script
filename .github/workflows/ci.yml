# =============================================================================
# Droy Language - Continuous Integration
# =============================================================================
# This workflow builds and tests Droy Language on multiple platforms.
#
# Triggers:
#   - Push to main branch
#   - Pull requests to main branch
#   - Weekly scheduled runs
#   - Manual dispatch
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  schedule:
    # Run every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release
      run_tests:
        description: 'Run tests'
        required: true
        default: true
        type: boolean

env:
  BUILD_TYPE: ${{ github.event.inputs.build_type || 'release' }}

jobs:
  # ===========================================================================
  # Code Quality Checks
  # ===========================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format cppcheck clang-tidy
      
      - name: Check code formatting
        run: |
          find src include tests -name "*.c" -o -name "*.h" | \
            xargs clang-format --dry-run --Werror
      
      - name: Run cppcheck
        run: |
          cppcheck --enable=all --suppress=missingInclude \
            --error-exitcode=1 src/ include/
      
      - name: Run clang-tidy
        run: |
          clang-tidy src/*.c -- -Iinclude || true

  # ===========================================================================
  # Build on Linux
  # ===========================================================================
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    needs: code-quality
    
    strategy:
      matrix:
        compiler: [gcc, clang]
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ${{ matrix.compiler }} \
            llvm-dev \
            libllvm14
      
      - name: Cache build
        uses: actions/cache@v3
        with:
          path: |
            obj/
            bin/
          key: ${{ runner.os }}-${{ matrix.compiler }}-${{ hashFiles('**/Makefile') }}
      
      - name: Build
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          if [[ "$BUILD_TYPE" == "debug" ]]; then
            make DEBUG=1 -j$(nproc)
          else
            make -j$(nproc)
          fi
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: droy-linux-${{ matrix.compiler }}
          path: |
            bin/
            lib/
          retention-days: 7

  # ===========================================================================
  # Build on macOS
  # ===========================================================================
  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    needs: code-quality
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          brew install llvm
      
      - name: Build
        run: |
          export PATH="/usr/local/opt/llvm/bin:$PATH"
          make -j$(sysctl -n hw.ncpu)
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: droy-macos
          path: |
            bin/
            lib/
          retention-days: 7

  # ===========================================================================
  # Build on Windows
  # ===========================================================================
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    needs: code-quality
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-llvm
      
      - name: Build
        shell: msys2 {0}
        run: |
          make CC=gcc -j$(nproc)
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: droy-windows
          path: |
            bin/
            lib/
          retention-days: 7

  # ===========================================================================
  # Run Tests
  # ===========================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build-linux
    if: ${{ github.event.inputs.run_tests != 'false' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: droy-linux-gcc
      
      - name: Make binaries executable
        run: chmod +x bin/*
      
      - name: Run unit tests
        run: |
          ./scripts/run-tests.sh -u --junit test-results.xml
      
      - name: Run example tests
        run: |
          ./scripts/run-tests.sh -e
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml
      
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: test-results.xml
          reporter: java-junit

  # ===========================================================================
  # Coverage
  # ===========================================================================
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: build-linux
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov
      
      - name: Generate coverage
        run: |
          ./scripts/run-tests.sh -c
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.info
          fail_ci_if_error: false
          verbose: true
      
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ===========================================================================
  # Sanitizer Tests
  # ===========================================================================
  sanitizer:
    name: Sanitizer Tests
    runs-on: ubuntu-latest
    needs: build-linux
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
      
      - name: Run with AddressSanitizer
        run: |
          ./scripts/run-tests.sh -s

  # ===========================================================================
  # Docker Build
  # ===========================================================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: droy-lang:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Test Docker image
        run: |
          docker run --rm droy-lang:latest droy -h

  # ===========================================================================
  # Release
  # ===========================================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows, test]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: Create release archives
        run: |
          for dir in droy-*; do
            if [[ -d "$dir" ]]; then
              tar -czf "${dir}.tar.gz" "$dir"
            fi
          done
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            droy-*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
